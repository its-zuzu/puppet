############################
# HTTPS SERVER (PORT 443)
############################
server {
    listen 443 ssl http2;
    server_name ctfquest.ddns.net;

    # Hide nginx version and server header completely
    server_tokens off;
    more_clear_headers Server;

    ############################
    # SSL (Managed by Certbot)
    ############################
    ssl_certificate /etc/letsencrypt/live/ctfquest.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ctfquest.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ############################
    # SECURITY HEADERS
    ############################
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP (strict - production build) - MUST be single line for HTTP/2
    # Removed unsafe-inline/unsafe-eval for XSS protection, kept 'unsafe-inline' for styles only (Vite injects dynamic styles)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' wss: ws:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; worker-src 'self' blob:;" always;

    # HSTS (ENABLE only when HTTPS confirmed stable)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    ############################
    # GZIP
    ############################
    gzip on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    ############################
    # UPLOAD LIMIT
    ############################
    client_max_body_size 100M;

    ############################
    # CERTBOT CHALLENGE
    ############################
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /var/www/html;
    }

    ############################
    # BLOCK SENSITIVE FILES
    ############################
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|sh|sql|bak|config|swp|htaccess|ini|php)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    ############################
    # FRONTEND (REACT)
    ############################
        # Security: Block access to sensitive files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
    
    # Security: Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
        # Verification files - serve directly without SPA fallback
    location = /aikido.txt {
        root /home/ubuntu/ctf-server1/frontend/dist;
    }
    
    location / {
        root /home/ubuntu/ctf-server1/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    ############################
    # BACKEND API
    ############################
    location /api/ {
        proxy_pass http://localhost:10000;
        proxy_http_version 1.1;

        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarded headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable buffering for real-time events
        proxy_buffering off;
    }
}

############################
# HTTP → HTTPS REDIRECT
############################
server {
    listen 80;
    server_name ctfquest.ddns.net;

    # Hide nginx version on HTTP redirect
    server_tokens off;

    return 301 https://$host$request_uri;
}
